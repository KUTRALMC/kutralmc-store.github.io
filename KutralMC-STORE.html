<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KutralMC Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#0b1220;color:white}

/* HERO */
.hero{
text-align:center;
padding:70px 20px;
background:linear-gradient(#00000080,#000000d0),
url('https://i.imgur.com/3ZQ3Z4F.jpg') center/cover;
}
.logo{font-size:60px;font-weight:800;color:orange;text-shadow:0 0 25px orange}

.skin{
width:120px;height:220px;margin:auto;
background:url('https://mc-heads.net/body/ZilanTalk/200') no-repeat center/contain;
animation:spin 6s infinite linear;
}
@keyframes spin{0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}

.ip{background:#1e293b;padding:10px 20px;border-radius:8px;margin:10px;cursor:pointer}

.btn{padding:12px 20px;border:none;border-radius:8px;margin:5px;font-weight:bold;cursor:pointer}
.buy{background:#22c55e;width:100%}

/* GRID */
.container{max-width:1100px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:15px}

.card{background:#1e293b;padding:15px;border-radius:12px;text-align:center;transition:.2s}
.card:hover{transform:scale(1.05)}

.price{color:gold;font-weight:bold}

/* OFERTA */
.offer{
background:linear-gradient(90deg,orange,gold);
color:black;padding:12px;text-align:center;font-weight:bold
}

/* COMPRAS */
.purchase{
display:flex;justify-content:space-between;
background:#334155;padding:10px;margin:5px 0;border-radius:6px
}
.name{color:#22c55e}

.footer{text-align:center;padding:20px;color:gray}
</style>
</head>

<body>

<div class="hero">
<div class="logo">🔥 KutralMC</div>
<div class="skin"></div>

<p>Survival • Factions • Eventos</p>

<div class="ip" onclick="copyIP()">kutralmccc.holy.gg</div>

<button class="btn" onclick="buy()">🛒 IR A LA TIENDA</button>

<p id="status">Cargando servidor...</p>
</div>

<div class="offer">
🔥 OFERTA TERMINA EN <span id="time"></span>
</div>

<div class="container">

<h2>Rangos disponibles</h2>

<div class="grid">

<div class="card">
<h3>VIP</h3>
<p class="price">$3 USD</p>
<button class="btn buy" onclick="buy()">Comprar</button>
</div>

<div class="card">
<h3>VIP+</h3>
<p class="price">$5 USD</p>
<button class="btn buy" onclick="buy()">Comprar</button>
</div>

<div class="card">
<h3>FAMOSO</h3>
<p class="price">$8 USD</p>
<button class="btn buy" onclick="buy()">Comprar</button>
</div>

<div class="card">
<h3>LEGENDARIO</h3>
<p class="price">$12 USD</p>
<button class="btn buy" onclick="buy()">Comprar</button>
</div>

</div>

<h2>Compras en vivo</h2>
<div id="list"></div>

</div>

<div class="footer">© KutralMC 2026</div>

<script>

// 🔥 TU LINK REAL DE TEBEX
const store="https://kutralmc-store.tebex.io/category/3274117";

function buy(){
window.open(store,"_blank");
}

// IP
function copyIP(){
navigator.clipboard.writeText("kutralmccc.holy.gg");
alert("IP copiada");
}

// SERVER REAL
async function server(){
try{
let r=await fetch("https://api.mcsrvstat.us/2/kutralmccc.holy.gg");
let d=await r.json();

document.getElementById("status").innerHTML=
d.online ? "🟢 "+d.players.online+" online" : "🔴 Offline";

}catch{
document.getElementById("status").textContent="Error";
}
}
setInterval(server,10000);
server();

// COMPRAS FAKE REALISTAS
const players=[
"ZilanTalk",
"TioPandaPerkin",
"AlexPro13",
"KiaraCraft",
"MrNubito",
"DarkZeta",
"DavidMC",
"LauraGames"
];

const items=["VIP","VIP+","FAMOSO","LEGENDARIO"];

function add(){
let p=players[Math.floor(Math.random()*players.length)];
let i=items[Math.floor(Math.random()*items.length)];

let div=document.createElement("div");
div.className="purchase";

div.innerHTML=`
<div>
<span class="name">${p}</span> compró ${i}
</div>
<div>${Math.floor(Math.random()*10)+1} min</div>
`;

document.getElementById("list").prepend(div);
}

setInterval(add,5000);

// TIMER
let t=7200;
setInterval(()=>{
t--;
let m=Math.floor(t/60);
let s=t%60;
document.getElementById("time").textContent=m+":"+String(s).padStart(2,"0");
if(t<=0)t=7200;
},1000);

</script>

</body>
</html>
